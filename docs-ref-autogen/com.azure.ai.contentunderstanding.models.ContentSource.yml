type: "class"
desc: "Abstract base class for parsed grounding sources returned by Content Understanding.\n\nThe service encodes source positions as compact strings in the <xref uid=\"com.azure.ai.contentunderstanding.models.ContentField.getSources()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ContentField#getSources()\"></xref> property. This class hierarchy parses those strings into strongly-typed objects:\n\n *  <xref uid=\"com.azure.ai.contentunderstanding.models.DocumentSource\" data-throw-if-not-resolved=\"false\" data-raw-source=\"DocumentSource\"></xref> — `D(page,x1,y1,x2,y2,x3,y3,x4,y4)`\n *  <xref uid=\"com.azure.ai.contentunderstanding.models.AudioVisualSource\" data-throw-if-not-resolved=\"false\" data-raw-source=\"AudioVisualSource\"></xref> — `AV(time[,x,y,w,h])`\n\nUse <xref uid=\"com.azure.ai.contentunderstanding.models.DocumentSource.parse(java.lang.String)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"DocumentSource#parse(String)\"></xref> or <xref uid=\"com.azure.ai.contentunderstanding.models.AudioVisualSource.parse(java.lang.String)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"AudioVisualSource#parse(String)\"></xref> to parse a semicolon-delimited string containing one or more segments."
