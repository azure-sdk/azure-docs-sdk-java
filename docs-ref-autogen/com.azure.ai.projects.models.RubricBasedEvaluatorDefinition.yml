  summary: "Get the pass<wbr>Threshold property: Pass/fail threshold for the aggregate rubric score, on the same normalized 0.0-1.0 scale as the emitted \\`score\\`."
  syntax: "public Double getPassThreshold()"
  desc: "Get the passThreshold property: Pass/fail threshold for the aggregate rubric score, on the same normalized 0.0-1.0 scale as the emitted \\`score\\`. When the runtime weighted average meets or exceeds this value, the result is \\`pass\\`. Defaults to 0.5 (equivalent to a raw 1-5 weighted average of 3.0). The 'any dimension scored 1 → fail' rule still applies regardless of this threshold."
  returns:
    description: "the passThreshold value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/Double.html\">Double</a>"
