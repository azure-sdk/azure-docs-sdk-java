.isSearchable()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BasicField#isSearchable()\"></xref> is true, then the inferred <xref uid=\"com.azure.search.documents.indexes.models.SearchFieldDataType\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SearchFieldDataType\"></xref> must be one of <xref uid=\"com.azure.search.documents.indexes.models.SearchFieldDataType.STRING\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SearchFieldDataType#STRING\"></xref>, <xref uid=\"com.azure.search.documents.indexes.models.SearchFieldDataType.collection(com.azure.search.documents.indexes.models.SearchFieldDataType)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SearchFieldDataType#collection(SearchFieldDataType)\"></xref> of <xref uid=\"com.azure.search.documents.indexes.models.SearchFieldDataType.STRING\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SearchFieldDataType#STRING\"></xref>, or <xref uid=\"com.azure.search.documents.indexes.models.SearchFieldDataType.collection(com.azure.search.documents.indexes.models.SearchFieldDataType)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SearchFieldDataType#collection(SearchFieldDataType)\"></xref> of <xref uid=\"com.azure.search.documents.indexes.models.SearchFieldDataType.SINGLE\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SearchFieldDataType#SINGLE\"></xref>.\n *  If <xref uid=\"com.azure.search.documents.indexes.BasicField.analyzerName()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BasicField#analyzerName()\"></xref> is set, both <xref uid=\"com.azure.search.documents.indexes.BasicField.searchAnalyzerName()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BasicField#searchAnalyzerName()\"></xref> and <xref uid=\"com.azure.search.documents.indexes.BasicField.indexAnalyzerName()\" data-throw-if-not-resolved=\"false\" data-raw-source=\"BasicField#indexAnalyzerName()\"></xref> must be empty.\n *  If <xref uid=\"com.azure.search.documents.indexes.Ba