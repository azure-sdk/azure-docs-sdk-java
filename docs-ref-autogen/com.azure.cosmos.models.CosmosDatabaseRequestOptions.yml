  syntax: "public String getIfMatchETag()"
  desc: "Gets the If-Match (ETag) associated with the request in the Azure Cosmos DB service. Most commonly used with replace and delete requests. This will be ignored if specified for create requests. For more details, refer to [optimistic concurrency control documentation][]\n\n\n[optimistic concurrency control documentation]: https://learn.microsoft.com/azure/cosmos-db/nosql/database-transactions-optimistic-concurrency#implementing-optimistic-concurrency-control-using-etag-and-http-headers"
