  syntax: "public static final Expander PRIORITY"
  desc: "Selects the node group that has the highest priority assigned by the user. It's configuration is described in more details \\[here\\](https://github.com/kubernetes/autoscaler/blob/master/cluster-autoscaler/expander/priority/readme.md)."
