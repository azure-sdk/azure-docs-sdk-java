  syntax: "public List<String> excludeBlobsWithPrefix()"
  desc: "Get the excludeBlobsWithPrefix property: Optional. A list of prefixes to exclude from on-upload malware scanning. Format: \\`container-name/blob-name\\` (start with the container name; do not include the storage account name). Exclude entire containers: Use prefix of container names you want to exclude without a trailing \\`/\\`. Exclude a single container: Add a trailing slash \\`/\\` after the container name to avoid excluding other containers with similar prefixes."
