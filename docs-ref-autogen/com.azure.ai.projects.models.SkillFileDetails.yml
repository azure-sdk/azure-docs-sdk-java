desc: "A file in an HTTP request, response, or multipart payload. A file in an HTTP request, response, or multipart payload. Files have a special meaning that the HTTP library understands. When the body of an HTTP request, response, or multipart payload is \\_effectively\\_ an instance of \\`TypeSpec.Http.File\\` or any type that extends it, the operation is treated as a file upload or download. When using file bodies, the fields of the file model are defined to come from particular locations by default: - \\`contentType\\`: The \\`Content-Type\\` header of the request, response, or multipart payload (CANNOT be overridden or changed). - \\`contents\\`: The body of the request, response, or multipart payload (CANNOT be overridden or changed). - \\`filename\\`: The \\`filename\\` parameter value of the \\`Content-Disposition\\` header of the response or multipart payload (MAY be overridden or changed). A File may be used as a normal structured JSON object in a request or response, if the request specifies an explicit \\`Content-Type\\` header. In this case, the entire File model is serialized as if it were any other model. In a JSON payload, it will have a structure like: \\`\\`\\` \\{ \"contentType\": <string?>, \"filename\": <string?>, \"contents\": <string, base64> \\} \\`\\`\\` The \\`contentType\\` \\_within\\_ the file defines what media types the data inside the file can be, but if the specification defines a \\`Content-Type\\` for the payload as HTTP metadata, that \\`Content-Type\\` metadata defines \\_how the file is serialized\\_. See the examples below for more information. NOTE: The \\`filename\\` and \\`contentType\\` fields are optional. Furthermore, the default location of \\`filename\\` (\\`Content-Disposition: <disposition>; filename=<filename>\\`) is only valid in HTTP responses and multipart payloads. If you wish to send the \\`filename\\` in a request, you must use HTTP metadata decorators to describe the location of the \\`filename\\` field. You can combine the metadata decorators with \\`@visibility\\` to control when the \\`filename\\` location is overridden, as shown in the examples below."
