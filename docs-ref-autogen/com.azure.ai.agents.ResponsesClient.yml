    type: "<xref href=\"com.openai.core.http.HttpResponseFor?alt=com.openai.core.http.HttpResponseFor&text=HttpResponseFor\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"com.openai.core.http.StreamResponse?alt=com.openai.core.http.StreamResponse&text=StreamResponse\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"com.openai.models.responses.ResponseStreamEvent?alt=com.openai.models.responses.ResponseStreamEvent&text=ResponseStreamEvent\" data-throw-if-not-resolved=\"False\" />&gt;&gt;"
