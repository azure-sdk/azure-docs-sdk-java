  desc: "Creates a streaming response from a raw JSON request body and returns the raw HTTP response.\n\nDelegates to the OpenAI Java SDK's <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ResponseService.WithRawResponse#createStreaming(ResponseCreateParams, RequestOptions)\"></xref>. The `createResponseRequest` payload is forwarded as the request body (semantically, not byte-for-byte: the JSON is parsed and re-serialized, so property ordering and exact formatting may change and duplicate top-level keys are not preserved).\n\nThe returned <xref uid=\"com.openai.core.http.HttpResponseFor\" data-throw-if-not-resolved=\"false\" data-raw-source=\"HttpResponseFor\"></xref> wraps a <xref uid=\"com.openai.core.http.StreamResponse\" data-throw-if-not-resolved=\"false\" data-raw-source=\"StreamResponse\"></xref> of <xref uid=\"com.openai.models.responses.ResponseStreamEvent\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ResponseStreamEvent\"></xref> items, which the caller iterates via <xref uid=\"com.openai.core.http.HttpResponseFor.parse*\" data-throw-if-not-resolved=\"false\" data-raw-source=\"HttpResponseFor#parse()\"></xref>. The underlying stream must be closed when iteration completes; the typical pattern is try-with-resources on either the <xref uid=\"com.openai.core.http.HttpResponseFor\" data-throw-if-not-resolved=\"false\" data-raw-source=\"HttpResponseFor\"></xref> or the parsed <xref uid=\"com.openai.core.http.StreamResponse\" data-throw-if-not-resolved=\"false\" data-raw-source=\"StreamResponse\"></xref>."
