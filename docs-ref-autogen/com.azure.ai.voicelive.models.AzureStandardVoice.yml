- uid: "com.azure.ai.voicelive.models.AzureStandardVoice.getPitch()"
  fullName: "com.azure.ai.voicelive.models.AzureStandardVoice.getPitch()"
  name: "getPitch()"
  nameWithType: "AzureStandardVoice.getPitch()"
  summary: "Get the pitch property: Pitch adjustment for the voice output."
  syntax: "public String getPitch()"
  desc: "Get the pitch property: Pitch adjustment for the voice output. Follows the same rules as the \\`pitch\\` attribute of the SSML \\`prosody\\` element (see https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice\\#adjust-prosody). Typical values: a named level (\\`x-low\\`, \\`low\\`, \\`medium\\`, \\`high\\`, \\`x-high\\`, \\`default\\`), a relative change (e.g., \\`+10%\\`, \\`-5%\\`, \\`+50Hz\\`, \\`-2st\\`), or an absolute frequency (e.g., \\`200Hz\\`)."
  returns:
    description: "the pitch value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
- uid: "com.azure.ai.voicelive.models.AzureStandardVoice.getPreferLocales()"
  fullName: "com.azure.ai.voicelive.models.AzureStandardVoice.getPreferLocales()"
  name: "getPreferLocales()"
  nameWithType: "AzureStandardVoice.getPreferLocales()"
  summary: "Get the prefer<wbr>Locales property: Preferred locales in BCP-47 format that change the accents of languages."
  syntax: "public List<String> getPreferLocales()"
  desc: "Get the preferLocales property: Preferred locales in BCP-47 format that change the accents of languages. If not set, TTS uses the default accent for each language (e.g., American English for English, Mexican Spanish for Spanish). Setting this to \\`\\[\"en-GB\", \"es-ES\"\\]\\` changes the English accent to British English and the Spanish accent to European Spanish, while TTS can still speak other languages like French or Chinese with their default accents."
  returns:
    description: "the preferLocales value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/util/List.html\">List</a>&lt;<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>&gt;"
