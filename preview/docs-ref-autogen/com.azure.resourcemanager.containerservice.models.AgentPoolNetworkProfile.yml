  name: "nodePublicIPPrefixIDs()"
  nameWithType: "AgentPoolNetworkProfile.nodePublicIPPrefixIDs()"
  summary: "Get the node<wbr>Public<wbr>IPPrefix<wbr>IDs property: The resource IDs of public IP prefixes for node public IPs."
  syntax: "public List<String> nodePublicIPPrefixIDs()"
  desc: "Get the nodePublicIPPrefixIDs property: The resource IDs of public IP prefixes for node public IPs. At most one IPv4 and one IPv6 prefix may be specified. Order does not matter; the RP determines IP version from the referenced resource's publicIPAddressVersion. Requires enableNodePublicIP to be true on the agent pool. Mutually exclusive with the top-level nodePublicIPPrefixID property. Immutable after node pool creation. To change prefixes, delete and recreate the node pool. For more information, see https://aka.ms/aks/ipv6-ilpip."
  returns:
