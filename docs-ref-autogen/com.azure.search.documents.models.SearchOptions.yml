- uid: "com.azure.search.documents.models.SearchOptions.getSessionId()"
  fullName: "com.azure.search.documents.models.SearchOptions.getSessionId()"
  name: "getSessionId()"
  nameWithType: "SearchOptions.getSessionId()"
  summary: "Get the session<wbr>Id property: A value to be used to create a sticky session, which can help getting more consistent results."
  syntax: "public String getSessionId()"
  desc: "Get the sessionId property: A value to be used to create a sticky session, which can help getting more consistent results. As long as the same sessionId is used, a best-effort attempt will be made to target the same replica set. Be wary that reusing the same sessionID values repeatedly can interfere with the load balancing of the requests across replicas and adversely affect the performance of the search service. The value used as sessionId cannot start with a '\\_' character."
  returns:
    description: "the sessionId value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
