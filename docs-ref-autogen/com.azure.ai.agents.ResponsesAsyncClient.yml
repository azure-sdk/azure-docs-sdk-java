    description: "a <xref uid=\"reactor.core.publisher.Mono\" data-throw-if-not-resolved=\"false\" data-raw-source=\"Mono\"></xref> emitting the raw HTTP response, parseable as a <xref uid=\"com.openai.core.http.StreamResponse\" data-throw-if-not-resolved=\"false\" data-raw-source=\"StreamResponse\"></xref> of <xref uid=\"com.openai.models.responses.ResponseStreamEvent\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ResponseStreamEvent\"></xref>."
    type: "<a href=\"https://projectreactor.io/docs/core/release/api/reactor/core/publisher/Mono.html\">Mono</a>&lt;<xref href=\"com.openai.core.http.HttpResponseFor?alt=com.openai.core.http.HttpResponseFor&text=HttpResponseFor\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"com.openai.core.http.StreamResponse?alt=com.openai.core.http.StreamResponse&text=StreamResponse\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"com.openai.models.responses.ResponseStreamEvent?alt=com.openai.models.responses.ResponseStreamEvent&text=ResponseStreamEvent\" data-throw-if-not-resolved=\"False\" />&gt;&gt;&gt;"
