  fullName: "com.azure.resourcemanager.containerservice.models.OSDiskType.EPHEMERAL"
  name: "EPHEMERAL"
  nameWithType: "OSDiskType.EPHEMERAL"
  summary: "Ephemeral OS disks are stored only on the host machine, just like a temporary disk."
  modifiers:
  - "static"
  - "final"
  field:
    type: "<xref href=\"com.azure.resourcemanager.containerservice.models.OSDiskType?alt=com.azure.resourcemanager.containerservice.models.OSDiskType&text=OSDiskType\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public static final OSDiskType EPHEMERAL"
  desc: "Ephemeral OS disks are stored only on the host machine, just like a temporary disk. This provides lower read/write latency, along with faster node scaling and cluster upgrades."
- uid: "com.azure.resourcemanager.containerservice.models.OSDiskType.MANAGED"
  fullName: "com.azure.resourcemanager.containerservice.models.OSDiskType.MANAGED"
  name: "MANAGED"
  nameWithType: "OSDiskType.MANAGED"
  summary: "Azure replicates the operating system disk for a virtual machine to Azure storage to avoid data loss should the VM need to be relocated to another host."
  modifiers:
  - "static"
  - "final"
  field:
    type: "<xref href=\"com.azure.resourcemanager.containerservice.models.OSDiskType?alt=com.azure.resourcemanager.containerservice.models.OSDiskType&text=OSDiskType\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public static final OSDiskType MANAGED"
  desc: "Azure replicates the operating system disk for a virtual machine to Azure storage to avoid data loss should the VM need to be relocated to another host. Since containers aren't designed to have local state persisted, this behavior offers limited value while providing some drawbacks, including slower node provisioning and higher read/write latency."
