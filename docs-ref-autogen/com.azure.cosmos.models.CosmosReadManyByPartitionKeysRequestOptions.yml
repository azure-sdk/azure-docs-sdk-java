type: "class"
desc: "Specifies the options associated with the `readManyByPartitionKeys` operation in the Azure Cosmos DB database service.\n\nThis is distinct from <xref uid=\"com.azure.cosmos.models.CosmosReadManyRequestOptions\" data-throw-if-not-resolved=\"false\" data-raw-source=\"CosmosReadManyRequestOptions\"></xref> (used by the `readMany(List<CosmosItemIdentity>)` API). It exposes only the knobs that are applicable to `readManyByPartitionKeys` — for example, properties that influence query parallelism inside a single physical partition or a feed range filter are intentionally not exposed because the operation is fully managed by the SDK."
