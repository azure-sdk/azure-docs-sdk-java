  syntax: "public Mono<HttpResponseFor<StreamResponse<ResponseStreamEvent>>> createResponseStreamWithResponse(BinaryData createResponseRequest, RequestOptions requestOptions)"
  desc: "Creates a streaming response from a raw JSON request body and returns the raw HTTP response.\n\nDelegates to the OpenAI Java SDK's <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ResponseServiceAsync.WithRawResponse#createStreaming(ResponseCreateParams, RequestOptions)\"></xref>. The `createResponseRequest` payload is forwarded as the request body (semantically, not byte-for-byte: the JSON is parsed and re-serialized, so property ordering and exact formatting may change and duplicate top-level keys are not preserved).\n\nThe returned <xref uid=\"com.openai.core.http.HttpResponseFor\" data-throw-if-not-resolved=\"false\" data-raw-source=\"HttpResponseFor\"></xref> wraps a <xref uid=\"com.openai.core.http.StreamResponse\" data-throw-if-not-resolved=\"false\" data-raw-source=\"StreamResponse\"></xref> of <xref uid=\"com.openai.models.responses.ResponseStreamEvent\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ResponseStreamEvent\"></xref> items, which the caller iterates via <xref uid=\"com.openai.core.http.HttpResponseFor.parse*\" data-throw-if-not-resolved=\"false\" data-raw-source=\"HttpResponseFor#parse()\"></xref>. Note that the underlying stream produced by the openai-java SDK's raw async streaming API is iterator-based and blocking; for a Reactor-friendly streaming surface use <xref uid=\"com.azure.ai.agents.ResponsesAsyncClient.createStreamingAzureResponse(com.azure.ai.agents.models.AzureCreateResponseOptions,com.openai.models.responses.ResponseCreateParams.Builder)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"#createStreamingAzureResponse(AzureCreateResponseOptions, ResponseCreateParams.Builder)\"></xref> instead."
