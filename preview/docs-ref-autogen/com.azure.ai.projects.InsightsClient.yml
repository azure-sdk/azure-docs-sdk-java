  syntax: "public Response<BinaryData> generateInsightWithResponse(BinaryData insight, RequestOptions requestOptions)"
  desc: "Generate Insights.\n\n**Header Parameters**\n\n    | ------------------------ | ------ | -------- | -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n    | Name                     | Type   | Required | Description                                                                                                                                                                                                                                  |\n    | Foundry-Features         | String | No       | A feature flag opt-in required when using preview operations or modifying persisted preview resources. Allowed values: \"Evaluations=V1Preview\", \"Schedules=V1Preview\", \"RedTeams=V1Preview\", \"Insights=V1Preview\", \"MemoryStores=V1Preview\". |\n    | repeatability-request-id | String | No       | Repeatability request ID header                                                                                                                                                                                                              |\n    | repeatability-first-sent | String | No       | Repeatability first sent header as HTTP-date                                                                                                                                                                                                 |\n\nYou can add these to a request with <xref uid=\"com.azure.core.http.rest.RequestOptions.addHeader\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RequestOptions#addHeader\"></xref>\n\n**Request Body Schema**\n\n```java\n{\n     id: String (Required)\n     metadata (Required): {\n         createdAt: OffsetDateTime (Required)\n         completedAt: OffsetDateTime (Optional)\n     }\n     state: String(NotStarted/Running/Succeeded/Failed/Canceled) (Required)\n     displayName: String (Required)\n     request (Required): {\n         type: String(EvaluationRunClusterInsight/AgentClusterInsight/EvaluationComparison) (Required)\n     }\n     result (Optional): {\n         type: String(EvaluationRunClusterInsight/AgentClusterInsight/EvaluationComparison) (Required)\n     }\n }\n```\n\n**Response Body Schema**\n\n```java\n{\n     id: String (Required)\n     metadata (Required): {\n         createdAt: OffsetDateTime (Required)\n         completedAt: OffsetDateTime (Optional)\n     }\n     state: String(NotStarted/Running/Succeeded/Failed/Canceled) (Required)\n     displayName: String (Required)\n     request (Required): {\n         type: String(EvaluationRunClusterInsight/AgentClusterInsight/EvaluationComparison) (Required)\n     }\n     result (Optional): {\n         type: String(EvaluationRunClusterInsight/AgentClusterInsight/EvaluationComparison) (Required)\n     }\n }\n```"
  returns:
    description: "the response body for cluster insights along with <xref uid=\"com.azure.core.http.rest.Response\" data-throw-if-not-resolved=\"false\" data-raw-source=\"Response\"></xref>."
    type: "<xref href=\"com.azure.core.http.rest.Response?alt=com.azure.core.http.rest.Response&text=Response\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"com.azure.core.util.BinaryData?alt=com.azure.core.util.BinaryData&text=BinaryData\" data-throw-if-not-resolved=\"False\" />&gt;"
