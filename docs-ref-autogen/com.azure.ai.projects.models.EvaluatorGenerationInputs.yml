- uid: "com.azure.ai.projects.models.EvaluatorGenerationInputs.getEvaluatorName()"
  fullName: "com.azure.ai.projects.models.EvaluatorGenerationInputs.getEvaluatorName()"
  name: "getEvaluatorName()"
  nameWithType: "EvaluatorGenerationInputs.getEvaluatorName()"
  summary: "Get the evaluator<wbr>Name property: The evaluator name (immutable identifier)."
  syntax: "public String getEvaluatorName()"
  desc: "Get the evaluatorName property: The evaluator name (immutable identifier). 1-256 characters; allowed characters are ASCII letters, digits, underscore (\\`\\_\\`), period (\\`.\\`), tilde (\\`~\\`), and hyphen (\\`-\\`). The prefix \\`builtin.\\` is reserved for system-managed evaluators and is rejected by the service. If an evaluator with this name already exists in the project (and is rubric-subtype), the service creates a new version under the same name and uses the prior version's \\`dimensions\\` as context for incremental improvement (foundation of the post-//build adaptive loop). Old versions remain queryable via \\`get\\_version(name, version)\\`. If the existing evaluator is not a rubric-subtype evaluator (built-in, prompt-based, code-based), the request is rejected with \\`400 Bad Request\\`."
  returns:
    description: "the evaluatorName value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
