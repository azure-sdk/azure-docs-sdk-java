desc: "Properties of the platform managed certificate.\n\n**Warning: this feature is currently intended for internal (first-party) Key Vault use only.** It is exposed in the preview service version `2026-03-01-preview` and is not generally available. Third-party calls that supply a <xref uid=\"com.azure.security.keyvault.certificates.models.CertificatePolicy\" data-throw-if-not-resolved=\"false\" data-raw-source=\"CertificatePolicy\"></xref> configured via <xref uid=\"com.azure.security.keyvault.certificates.models.CertificatePolicy.forPlatformManaged(com.azure.security.keyvault.certificates.models.PlatformManaged)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"CertificatePolicy#forPlatformManaged(PlatformManaged)\"></xref> will be rejected by the service. The shape accepted under <xref uid=\"com.azure.security.keyvault.certificates.models.PlatformManaged.setMetadata(java.util.Map<java.lang.String,java.lang.Object>)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"#setMetadata(Map)\"></xref> and the values accepted for <xref uid=\"com.azure.security.keyvault.certificates.models.PlatformManaged.setCertificateUsage(java.lang.String)\" data-throw-if-not-resolved=\"false\" data-raw-source=\"#setCertificateUsage(String)\"></xref> are owned by the Key Vault service and may change without notice. Do not use this type in production code."
