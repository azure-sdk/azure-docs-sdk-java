desc: "A single Server-Sent Event frame emitted by the hosted agent session log stream. Each frame contains an \\`event\\` field identifying the event type and a \\`data\\` field carrying the payload as plain text. Although the current \\`data\\` payload is JSON-formatted, its schema is not contractual — additional keys may appear and the format may change over time. Clients should treat \\`data\\` as an opaque string and optionally attempt JSON parsing. New event types may be added in the future. Clients should gracefully ignore unrecognized event types. Wire format: \\`\\`\\` event: log data: \\{\"timestamp\":\"2026-03-10T09:33:17.121Z\",\"stream\":\"stdout\",\"message\":\"Starting server on port 18080\"\\} event: log data: \\{\"timestamp\":\"2026-03-10T09:34:52.714Z\",\"stream\":\"status\",\"message\":\"Successfully connected to container\"\\} \\`\\`\\`."
