  nameWithType: "AzureAvatarVoiceSyncVoice.getPreferLocales()"
  summary: "Get the prefer<wbr>Locales property: Preferred locales in BCP-47 format that change the accents of languages."
  syntax: "public List<String> getPreferLocales()"
  desc: "Get the preferLocales property: Preferred locales in BCP-47 format that change the accents of languages. If not set, TTS uses the default accent for each language (e.g., American English for English, Mexican Spanish for Spanish). Setting this to \\`\\[\"en-GB\", \"es-ES\"\\]\\` changes the English accent to British English and the Spanish accent to European Spanish, while TTS can still speak other languages like French or Chinese with their default accents."
  returns:
    description: "the preferLocales value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/util/List.html\">List</a>&lt;<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>&gt;"
