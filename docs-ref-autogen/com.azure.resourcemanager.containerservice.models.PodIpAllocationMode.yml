fields:
- uid: "com.azure.resourcemanager.containerservice.models.PodIpAllocationMode.DYNAMIC_INDIVIDUAL"
  fullName: "com.azure.resourcemanager.containerservice.models.PodIpAllocationMode.DYNAMIC_INDIVIDUAL"
  name: "DYNAMIC_INDIVIDUAL"
  nameWithType: "PodIpAllocationMode.DYNAMIC_INDIVIDUAL"
  summary: "Each node gets allocated with a non-contiguous list of IP addresses assignable to pods."
  modifiers:
  - "static"
  - "final"
  field:
    type: "<xref href=\"com.azure.resourcemanager.containerservice.models.PodIpAllocationMode?alt=com.azure.resourcemanager.containerservice.models.PodIpAllocationMode&text=PodIpAllocationMode\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public static final PodIpAllocationMode DYNAMIC_INDIVIDUAL"
  desc: "Each node gets allocated with a non-contiguous list of IP addresses assignable to pods. This is better for maximizing a small to medium subnet of size /16 or smaller. The Azure CNI cluster with dynamic IP allocation defaults to this mode if the customer does not explicitly specify a podIPAllocationMode."
- uid: "com.azure.resourcemanager.containerservice.models.PodIpAllocationMode.STATIC_BLOCK"
  fullName: "com.azure.resourcemanager.containerservice.models.PodIpAllocationMode.STATIC_BLOCK"
  name: "STATIC_BLOCK"
  nameWithType: "PodIpAllocationMode.STATIC_BLOCK"
  summary: "Each node is statically allocated CIDR block(s) of size /28 = 16 IPs per block to satisfy the max<wbr>Pods per node."
  modifiers:
  - "static"
  - "final"
  field:
    type: "<xref href=\"com.azure.resourcemanager.containerservice.models.PodIpAllocationMode?alt=com.azure.resourcemanager.containerservice.models.PodIpAllocationMode&text=PodIpAllocationMode\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public static final PodIpAllocationMode STATIC_BLOCK"
  desc: "Each node is statically allocated CIDR block(s) of size /28 = 16 IPs per block to satisfy the maxPods per node. Number of CIDR blocks >= (maxPods / 16). The block, rather than a single IP, counts against the Azure Vnet Private IP limit of 65K. Therefore block mode is suitable for running larger workloads with more than the current limit of 65K pods in a cluster. This mode is better suited to scale with larger subnets of /15 or bigger."
