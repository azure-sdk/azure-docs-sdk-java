nce, if you make a list request and receive 100 objects, ending with obj\\_foo, your subsequent call can include after=obj\\_foo in order to fetch the next page of the list.       |\n    | before | String  | No       | A cursor for use in pagination. \\`before\\` is an object ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, ending with obj\\_foo, your subsequent call can include before=obj\\_foo in order to fetch the previous page of the list. |\n\nYou can add these to a request with <xref uid=\"com.azure.core.http.rest.RequestOptions.addQueryParam\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RequestOptions#addQueryParam\"></xref>\n\n**Header Parameters**\n\n    | ----------------------- | ------ | -------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------ |\n    | Name                    | Type   | Required | Description                                                                                                                                                                                                                                                  |\n    | Foundry-Features        | String | No       | A feature flag opt-in required when using preview operations or modifying persisted preview resources. Allowed values: \"HostedAgents=V1Preview\", \"WorkflowAgents=V1Preview\", \"AgentEndpoints=V1Preview\", \"CodeAgents=V1Preview\", \"ExternalAgents=V1Preview\". |\n    | x-ms-user-isolation-key | String | No       | Opaque per-user isolation key used to scope endpoint-scoped data (responses, conversations, sessions) to a specific end user.                                                                                                                                |\n\nYou can add these to