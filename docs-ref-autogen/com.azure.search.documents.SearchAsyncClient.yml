    name: "options"
    type: "<xref href=\"com.azure.search.documents.models.SearchOptions?alt=com.azure.search.documents.models.SearchOptions&text=SearchOptions\" data-throw-if-not-resolved=\"False\" />"
  - description: "The options to configure the HTTP request before HTTP client sends it."
    name: "requestOptions"
    type: "<xref href=\"com.azure.core.http.rest.RequestOptions?alt=com.azure.core.http.rest.RequestOptions&text=RequestOptions\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public SearchPagedFlux search(SearchOptions options, RequestOptions requestOptions)"
  desc: "Searches for documents in the Azure AI Search index.\n\n**Header Parameters**\n\n    | ------------------------------- | ------- | -------- | ----------------------------------------------------------------------------------------------------------------------------------- |\n    | Name                            | Type    | Required | Description                                                                                                                         |\n    | x-ms-query-source-authorization | String  | No       | Token identifying the user for which the query is being executed. This token is used to enforce security restrictions on documents. |\n    | x-ms-enable-elevated-read       | Boolean | No       | A value that enables elevated read that bypass document level permission checks for the query operation.                            |\n\nYou can add these to a request with <xref uid=\"com.azure.core.http.rest.RequestOptions.addHeader\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RequestOptions#addHeader\"></xref>\n\nThe <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ContinuablePagedFlux\"></xref> will iterate through search result pages until all search results are returned. Each page is determined by the `$skip` and `$top` values and the Search service has a limit on the number of documents that can be skipped, more information about the `$skip` limit can be found at [Search Documents REST API][] and reading the `$skip` description. If the total number of results exceeds the `$skip` limit the <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ContinuablePagedFlux\"></xref> won't prevent you from exceeding the `$skip` limit. To prevent exceeding the limit you can track the number of documents returned and stop requesting new pages when the limit is reached.\n\n\n[Search Documents REST API]: https://learn.microsoft.com/rest/api/searchservice/search-documents"
