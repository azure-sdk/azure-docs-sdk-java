  syntax: "public SyncPoller<BinaryData,BinaryData> beginAnalyze(String analyzerId, BinaryData analyzeRequest, RequestOptions requestOptions)"
  desc: "Extract content and fields from input.\n\n**Query Parameters**\n\n    | ------------------ | ------ | -------- | ------------------------------------------------------------------------------------------------------------------------------------------------- |\n    | Name               | Type   | Required | Description                                                                                                                                       |\n    | stringEncoding     | String | No       | The string encoding format for content spans in the response. Possible values are 'codePoint', 'utf16', and \\`utf8\\`. Default is \\`codePoint\\`.\") |\n    | processingLocation | String | No       | The location where the data may be processed. Defaults to global. Allowed values: \"geography\", \"dataZone\", \"global\".                              |\n\nYou can add these to a request with <xref uid=\"com.azure.core.http.rest.RequestOptions.addQueryParam\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RequestOptions#addQueryParam\"></xref>\n\n**Request Body Schema**\n\n```java\n{\n     inputs (Required): [\n          (Required){\n             url: String (Optional)\n             data: byte[] (Optional)\n             name: String (Optional)\n             mimeType: String (Optional)\n             range: String (Optional)\n         }\n     ]\n     modelDeployments (Optional): {\n         String: String (Required)\n     }\n }\n```\n\n**Response Body Schema**\n\n```java\n{\n     id: String (Required)\n     status: String(NotStarted/Running/Succeeded/Failed/Canceled) (Required)\n     error (Optional): {\n         code: String (Required)\n         message: String (Required)\n         target: String (Optional)\n         details (Optional): [\n             (recursive schema, see above)\n         ]\n         innererror (Optional): {\n             code: String (Optional)\n             innererror (Optional): (recursive schema, see innererror above)\n         }\n     }\n     result (Optional): {\n         analyzerId: String (Optional)\n         apiVersion: String (Optional)\n         createdAt: OffsetDateTime (Optional)\n         warnings (Optional): [\n             (recursive schema, see above)\n         ]\n         stringEncoding: String (Optional)\n         contents (Required): [\n              (Required){\n                 kind: String(document/audioVisual) (Required)\n                 mimeType: String (Required)\n                 analyzerId: String (Optional)\n                 category: String (Optional)\n                 path: String (Optional)\n                 markdown: String (Optional)\n                 fields (Optional): {\n                     String (Required): {\n                         type: String(string/date/time/number/integer/boolean/array/object/json) (Required)\n                         spans (Optional): [\n                              (Optional){\n                                 offset: int (Required)\n                                 length: int (Required)\n                             }\n                         ]\n                         confidence: Double (Optional)\n                         source: String (Optional)\n                     }\n                 }\n             }\n         ]\n     }\n     usage (Optional): {\n         documentPagesMinimal: Integer (Optional)\n         documentPagesBasic: Integer (Optional)\n         documentPagesStandard: Integer (Optional)\n         audioHours: Double (Optional)\n         videoHours: Double (Optional)\n         contextualizationTokens: Integer (Optional)\n         tokens (Optional): {\n             String: int (Required)\n         }\n     }\n }\n```"
  returns:
    description: "the <xref uid=\"com.azure.core.util.polling.SyncPoller\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SyncPoller\"></xref> for polling of provides status details for analyze operations."
    type: "<xref href=\"com.azure.core.util.polling.SyncPoller?alt=com.azure.core.util.polling.SyncPoller&text=SyncPoller\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"com.azure.core.util.BinaryData?alt=com.azure.core.util.BinaryData&text=BinaryData\" data-throw-if-not-resolved=\"False\" />,<xref href=\"com.azure.core.util.BinaryData?alt=com.azure.core.util.BinaryData&text=BinaryData\" data-throw-if-not-resolved=\"False\" />&gt;"
