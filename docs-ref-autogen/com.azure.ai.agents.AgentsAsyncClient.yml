  desc: "Cancels an agent optimization job. Request cancellation. Idempotent on terminal states.\n\n**Header Parameters**\n\n    | ---------------- | ------ | -------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n    | Name             | Type   | Required | Description                                                                                                                                                                                                                                                                                                                                                                                       |\n    | Foundry-Features | String | No       | A feature flag opt-in required when using preview operations or modifying persisted preview resources. Allowed values: \"Evaluations=V1Preview\", \"Schedules=V1Preview\", \"RedTeams=V1Preview\", \"Insights=V1Preview\", \"MemoryStores=V1Preview\", \"Routines=V1Preview\", \"Toolboxes=V1Preview\", \"Skills=V1Preview\", \"DataGenerationJobs=V1Preview\", \"Models=V1Preview\", \"AgentsOptimization=V1Preview\". |\n\nYou can add these to a request with <xref uid=\"com.azure.core.http.rest.RequestOptions.addHeader\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RequestOptions#addHeader\"></xref>\n\n**Response Body Schema**\n\n```java\n{\n     id: String (Required)\n     status: String(queued/in_progress/succeeded/failed/cancelled) (Required)\n     error (Optional): {\n         code: String (Required)\n         message: String (Required)\n         param: String (Optional)\n         type: String (Optional)\n         details (Optional): [\n             (recursive schema, see above)\n         ]\n         additionalInfo (Optional): {\n             String: BinaryData (Required)\n         }\n         debugInfo (Optional): {\n             String: BinaryData (Required)\n         }\n     }\n     result (Optional): {\n         baseline (Optional): {\n             candidate_id: String (Optional)\n             name: String (Required)\n             config (Required): {\n                 agent_name: String (Optional)\n                 agent_version: String (Optional)\n                 model: String (Optional)\n                 system_prompt: String (Optional)\n                 skills (Optional): [\n                      (Optional){\n                         String: BinaryData (Required)\n                     }\n                 ]\n                 tools (Optional): [\n                      (Optional){\n                         String: BinaryData (Required)\n                     }\n                 ]\n             }\n             mutations (Required): {\n                 String: BinaryData (Required)\n             }\n             avg_score: double (Required)\n             avg_tokens: double (Required)\n             pass_rate: double (Required)\n             task_scores (Required): [\n                  (Required){\n                     task_name: String (Required)\n                     query: String (Optional)\n                     scores (Required): {\n                         String: double (Required)\n                     }\n                     composite_score: double (Required)\n                     tokens: long (Required)\n                     duration_seconds: double (Required)\n                     passed: boolean (Required)\n                     error_message: String (Optional)\n                     rationales (Optional): {\n                         String: String (Required)\n                     }\n                     response: String (Optional)\n                     run_id: String (Optional)\n                 }\n             ]\n             is_pareto_optimal: boolean (Required)\n             eval_id: String (Optional)\n             eval_run_id: String (Optional)\n             promotion (Optional): {\n                 promoted_at: long (Required)\n                 agent_name: String (Required)\n                 agent_version: String (Required)\n             }\n         }\n         best (Optional): (recursive schema, see best above)\n         candidates (Optional): [\n             (recursive schema, see above)\n         ]\n         options (Optional): {\n             max_iterations: Integer (Optional)\n             optimization_config (Optional): {\n                 String: BinaryData (Required)\n             }\n             eval_model: String (Optional)\n             optimization_model: String (Optional)\n             evaluation_level: String(turn/conversation) (Optional)\n         }\n         warnings (Optional): [\n             String (Optional)\n         ]\n         all_target_attributes_failed: Boolean (Optional)\n     }\n     inputs (Optional): {\n         agent (Required): {\n             agent_name: String (Required)\n             agent_version: String (Optional)\n         }\n         train_dataset_reference (Required): {\n             name: String (Required)\n             version: String (Optional)\n         }\n         validation_dataset_reference (Optional): (recursive schema, see validation_dataset_reference above)\n         evaluators (Optional): [\n             String (Optional)\n         ]\n         options (Optional): (recursive schema, see options above)\n     }\n     created_at: long (Required)\n     updated_at: Long (Optional)\n     progress (Optional): {\n         current_iteration: int (Required)\n         best_score: double (Required)\n         elapsed_seconds: double (Required)\n     }\n     dataset (Optional): {\n         name: String (Optional)\n         version: String (Optional)\n         task_count: int (Required)\n         is_inline: boolean (Required)\n     }\n }\n```"
