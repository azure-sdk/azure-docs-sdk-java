  name: "getDocumentWithResponse(String key, RequestOptions requestOptions)"
  nameWithType: "SearchAsyncClient.getDocumentWithResponse(String key, RequestOptions requestOptions)"
  summary: "Retrieves a document from the index."
  parameters:
  - description: "The key of the document to retrieve."
    name: "key"
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
  - description: "The options to configure the HTTP request before HTTP client sends it."
    name: "requestOptions"
    type: "<xref href=\"com.azure.core.http.rest.RequestOptions?alt=com.azure.core.http.rest.RequestOptions&text=RequestOptions\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public Mono<Response<LookupDocument>> getDocumentWithResponse(String key, RequestOptions requestOptions)"
  desc: "Retrieves a document from the index.\n\n**Query Parameters**\n\n    | ------- | ------------ | -------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------- |\n    | Name    | Type         | Required | Description                                                                                                                                                |\n    | $select | List<String> | No       | List of field names to retrieve for the document; Any field not retrieved will be missing from the returned document. In the form of \",\" separated string. |\n\nYou can add these to a request with <xref uid=\"com.azure.core.http.rest.RequestOptions.addQueryParam\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RequestOptions#addQueryParam\"></xref>\n\n**Header Parameters**\n\n    | ------------------------------- | ------- | -------- | ----------------------------------------------------------------------------------------------------------------------------------- |\n    | Name                            | Type    | Required | Description                                                                                                                         |\n    | x-ms-query-source-authorization | String  | No       | Token identifying the user for which the query is being executed. This token is used to enforce security restrictions on documents. |\n    | x-ms-enable-elevated-read       | Boolean | No       | A value that enables elevated read that bypass document level permission checks for the query operation.                            |\n\nYou can add these to a request with <xref uid=\"com.azure.core.http.rest.RequestOptions.addHeader\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RequestOptions#addHeader\"></xref>"
  returns:
    description: "a document retrieved via a document lookup operation along with <xref uid=\"com.azure.core.http.rest.Response\" data-throw-if-not-resolved=\"false\" data-raw-source=\"Response\"></xref> on successful completion\n of <xref uid=\"reactor.core.publisher.Mono\" data-throw-if-not-resolved=\"false\" data-raw-source=\"Mono\"></xref>."
    type: "<a href=\"https://projectreactor.io/docs/core/release/api/reactor/core/publisher/Mono.html\">Mono</a>&lt;<xref href=\"com.azure.core.http.rest.Response?alt=com.azure.core.http.rest.Response&text=Response\" data-throw-if-not-resolved=\"False\" />&lt;<xref href=\"com.azure.search.documents.models.LookupDocument?alt=com.azure.search.documents.models.LookupDocument&text=LookupDocument\" data-throw-if-not-resolved=\"False\" />&gt;&gt;"
