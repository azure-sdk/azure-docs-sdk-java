- uid: "com.azure.resourcemanager.containerservice.models.Expander.LEAST_WASTE"
  fullName: "com.azure.resourcemanager.containerservice.models.Expander.LEAST_WASTE"
  name: "LEAST_WASTE"
  nameWithType: "Expander.LEAST_WASTE"
  summary: "Selects the node group that will have the least idle CPU (if tied, unused memory) after scale-up."
  modifiers:
  - "static"
  - "final"
  field:
    type: "<xref href=\"com.azure.resourcemanager.containerservice.models.Expander?alt=com.azure.resourcemanager.containerservice.models.Expander&text=Expander\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public static final Expander LEAST_WASTE"
  desc: "Selects the node group that will have the least idle CPU (if tied, unused memory) after scale-up. This is useful when you have different classes of nodes, for example, high CPU or high memory nodes, and only want to expand those when there are pending pods that need a lot of those resources."
- uid: "com.azure.resourcemanager.containerservice.models.Expander.MOST_PODS"
  fullName: "com.azure.resourcemanager.containerservice.models.Expander.MOST_PODS"
  name: "MOST_PODS"
  nameWithType: "Expander.MOST_PODS"
  summary: "Selects the node group that would be able to schedule the most pods when scaling up."
  modifiers:
  - "static"
  - "final"
  field:
    type: "<xref href=\"com.azure.resourcemanager.containerservice.models.Expander?alt=com.azure.resourcemanager.containerservice.models.Expander&text=Expander\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public static final Expander MOST_PODS"
  desc: "Selects the node group that would be able to schedule the most pods when scaling up. This is useful when you are using nodeSelector to make sure certain pods land on certain nodes. Note that this won't cause the autoscaler to select bigger nodes vs. smaller, as it can add multiple smaller nodes at once."
- uid: "com.azure.resourcemanager.containerservice.models.Expander.PRIORITY"
  fullName: "com.azure.resourcemanager.containerservice.models.Expander.PRIORITY"
  name: "PRIORITY"
  nameWithType: "Expander.PRIORITY"
  summary: "Selects the node group that has the highest priority assigned by the user."
  modifiers:
  - "static"
  - "final"
  field:
