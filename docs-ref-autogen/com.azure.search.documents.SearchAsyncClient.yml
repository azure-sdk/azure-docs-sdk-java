- uid: "com.azure.search.documents.SearchAsyncClient.search(com.azure.search.documents.models.SearchOptions)"
  fullName: "com.azure.search.documents.SearchAsyncClient.search(SearchOptions options)"
  name: "search(SearchOptions options)"
  nameWithType: "SearchAsyncClient.search(SearchOptions options)"
  summary: "Searches for documents in the Azure AI Search index."
  parameters:
  - description: "Options for search API."
    name: "options"
    type: "<xref href=\"com.azure.search.documents.models.SearchOptions?alt=com.azure.search.documents.models.SearchOptions&text=SearchOptions\" data-throw-if-not-resolved=\"False\" />"
  syntax: "public SearchPagedFlux search(SearchOptions options)"
  desc: "Searches for documents in the Azure AI Search index.\n\nThe <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ContinuablePagedFlux\"></xref> will iterate through search result pages until all search results are returned. Each page is determined by the `$skip` and `$top` values and the Search service has a limit on the number of documents that can be skipped, more information about the `$skip` limit can be found at [Search Documents REST API][] and reading the `$skip` description. If the total number of results exceeds the `$skip` limit the <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ContinuablePagedFlux\"></xref> won't prevent you from exceeding the `$skip` limit. To prevent exceeding the limit you can track the number of documents returned and stop requesting new pages when the limit is reached.\n\n\n[Search Documents REST API]: https://learn.microsoft.com/rest/api/searchservice/search-documents"
  returns:
    description: "A <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ContinuablePagedFlux\"></xref> that iterates over search results and provides access to the\n <xref uid=\"com.azure.search.documents.models.SearchPagedResponse\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SearchPagedResponse\"></xref> for each page containing HTTP response and count, facet, and coverage information."
    type: "<xref href=\"com.azure.search.documents.models.SearchPagedFlux?alt=com.azure.search.documents.models.SearchPagedFlux&text=SearchPagedFlux\" data-throw-if-not-resolved=\"False\" />"
- uid: "com.azure.search.documents.SearchAsyncClient.search(com.azure.search.documents.models.SearchOptions,com.azure.core.http.rest.RequestOptions)"
