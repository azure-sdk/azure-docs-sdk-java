  syntax: "public CosmosStoredProcedureRequestOptions setAdditionalHeaders(Map<CosmosAdditionalHeaderName,String> additionalHeaders)"
  desc: "Sets additional headers to be included with this specific request.\n\nThe <xref uid=\"com.azure.cosmos.models.CosmosAdditionalHeaderName\" data-throw-if-not-resolved=\"false\" data-raw-source=\"CosmosAdditionalHeaderName\"></xref> class defines exactly which headers are supported. This allows per-request header customization, such as setting a workload ID that overrides the client-level default set via <xref uid=\"com.azure.cosmos.CosmosClientBuilder.additionalHeaders*\" data-throw-if-not-resolved=\"false\" data-raw-source=\"com.azure.cosmos.CosmosClientBuilder#additionalHeaders(java.util.Map)\"></xref>.\n\nIf the same header is also set at the client level, the request-level value takes precedence.\n\n**Note:** This method uses additive (merge) semantics — headers from multiple calls are merged into the existing set. Passing `null` or an empty map does *not* clear previously set headers. To reset headers, create a new options instance."
