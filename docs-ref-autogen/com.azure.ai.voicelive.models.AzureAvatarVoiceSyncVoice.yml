  nameWithType: "AzureAvatarVoiceSyncVoice.getPitch()"
  summary: "Get the pitch property: Pitch adjustment for the voice output."
  syntax: "public String getPitch()"
  desc: "Get the pitch property: Pitch adjustment for the voice output. Follows the same rules as the \\`pitch\\` attribute of the SSML \\`prosody\\` element (see https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice\\#adjust-prosody). Typical values: a named level (\\`x-low\\`, \\`low\\`, \\`medium\\`, \\`high\\`, \\`x-high\\`, \\`default\\`), a relative change (e.g., \\`+10%\\`, \\`-5%\\`, \\`+50Hz\\`, \\`-2st\\`), or an absolute frequency (e.g., \\`200Hz\\`)."
  returns:
    description: "the pitch value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
- uid: "com.azure.ai.voicelive.models.AzureAvatarVoiceSyncVoice.getPreferLocales()"
