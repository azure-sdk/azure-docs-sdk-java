  nameWithType: "AzureAvatarVoiceSyncVoice.getLocale()"
  summary: "Get the locale property: Enforced locale in BCP-47 format for TTS output."
  syntax: "public String getLocale()"
  desc: "Get the locale property: Enforced locale in BCP-47 format for TTS output. If set, TTS will always use the specified locale to speak. For example, setting locale to \\`en-US\\` forces American English accent for all text content, even if the text is in another language, and TTS will output silence for unsupported languages (e.g., Chinese text with \\`en-US\\` locale). If not set, TTS automatically detects the language from the text content."
  returns:
    description: "the locale value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
