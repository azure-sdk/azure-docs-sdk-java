  syntax: "public List<String> getKinds()"
  desc: "Get the kinds property: The kinds of rows present in \\`dataset\\`. Always contains \\`\"spec\"\\` (the generated evaluation specification, a Markdown document describing what the evaluator measures). May additionally contain \\`\"tools\"\\` (when the generation pipeline produced or inferred OpenAI tool schemas) and/or \\`\"context\"\\` (when supplementary materials such as file uploads or trace samples were used during generation)."
