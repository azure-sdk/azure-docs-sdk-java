  desc: "Convert a Content Understanding analysis result into LLM-friendly text.\n\nProduces a YAML front matter block (delimited by `---`) followed by a markdown body. The YAML front matter may include: `contentType` (document, audioVisual), `pages` (page number or range), `timeRange` (media time span for multi-segment audio/video), `category` (classification label), `fields` (extracted structured fields as YAML), `rai_warnings` (content safety flags), and any caller-supplied metadata entries.\n\nThe markdown body contains the extracted text with page-break markers (``) inserted at page boundaries so downstream consumers can locate content by page number."
  returns:
    description: "a formatted string with YAML front matter followed by markdown content.\n     Returns an empty string when <code>result.getContents()</code> is empty."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
