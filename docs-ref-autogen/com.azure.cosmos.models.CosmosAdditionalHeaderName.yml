desc: "Defines the set of additional headers that can be set on a <xref uid=\"com.azure.cosmos.CosmosClientBuilder\" data-throw-if-not-resolved=\"false\" data-raw-source=\"CosmosClientBuilder\"></xref> via <xref uid=\"com.azure.cosmos.CosmosClientBuilder.additionalHeaders*\" data-throw-if-not-resolved=\"false\" data-raw-source=\"CosmosClientBuilder#additionalHeaders(java.util.Map)\"></xref>.\n\nOnly headers with RNTBD encoding support are included, ensuring consistent behavior across both Gateway mode (HTTP) and Direct mode (RNTBD binary protocol).\n\nThis class uses the non-exhaustive final class pattern (rather than Java enum) for binary compatibility when new header names are added in future releases. See [Azure SDK Java Guidelines - Enumerations][].\n\n\n[Azure SDK Java Guidelines - Enumerations]: https://azure.github.io/azure-sdk/java_introduction.html#enumerations"
