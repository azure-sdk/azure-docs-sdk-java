  syntax: "public HttpResponseFor<Response> createResponseWithResponse(BinaryData createResponseRequest, RequestOptions requestOptions)"
  desc: "Creates a response from a raw JSON request body and returns the raw HTTP response.\n\nThis protocol method delegates to the OpenAI Java SDK's <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ResponseService.WithRawResponse#create(ResponseCreateParams, RequestOptions)\"></xref>. The `createResponseRequest` payload is forwarded as the request body (semantically, not byte-for-byte: the JSON is parsed and re-serialized via `additionalBodyProperties`, so property ordering and exact formatting may change and duplicate top-level keys are not preserved), so callers can include Azure-specific extensions (such as <xref uid=\"com.azure.ai.agents.models.AgentReference\" data-throw-if-not-resolved=\"false\" data-raw-source=\"com.azure.ai.agents.models.AgentReference\"></xref>) without going through the strongly-typed <xref uid=\"\" data-throw-if-not-resolved=\"false\" data-raw-source=\"ResponseCreateParams.Builder\"></xref>.\n\nThe returned <xref uid=\"com.openai.core.http.HttpResponseFor\" data-throw-if-not-resolved=\"false\" data-raw-source=\"HttpResponseFor\"></xref> exposes the status code, headers, and the raw response stream via `body()`, or the typed <xref uid=\"com.openai.models.responses.Response\" data-throw-if-not-resolved=\"false\" data-raw-source=\"Response\"></xref> via `parse()`. Only one of `body()` or `parse()` may be invoked per response, and the caller must close the response (e.g. via try-with-resources) to release the underlying connection.\n\nNote: the second parameter is the openai-java <xref uid=\"com.openai.core.RequestOptions\" data-throw-if-not-resolved=\"false\" data-raw-source=\"RequestOptions\"></xref> (not the azure-core type) so that the OpenAI-supported options (timeout, response validation) translate faithfully. Additional headers or query parameters must be supplied via the OpenAI request builder pattern (e.g. by using <xref uid=\"com.azure.ai.agents.ResponsesClient.createAzureResponse*\" data-throw-if-not-resolved=\"false\" data-raw-source=\"#createAzureResponse\"></xref> for fully-typed requests)."
