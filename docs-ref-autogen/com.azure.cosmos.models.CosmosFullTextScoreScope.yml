  fullName: "com.azure.cosmos.models.CosmosFullTextScoreScope.GLOBAL"
  name: "GLOBAL"
  nameWithType: "CosmosFullTextScoreScope.GLOBAL"
  summary: "Compute BM25 statistics (term frequency, inverse document frequency, and document length) across all documents in the container, including all physical and logical partitions."
  desc: "Compute BM25 statistics (term frequency, inverse document frequency, and document length) across all documents in the container, including all physical and logical partitions. This is the default behavior."
- uid: "com.azure.cosmos.models.CosmosFullTextScoreScope.LOCAL"
  fullName: "com.azure.cosmos.models.CosmosFullTextScoreScope.LOCAL"
  name: "LOCAL"
  nameWithType: "CosmosFullTextScoreScope.LOCAL"
  summary: "Compute BM25 statistics only over the subset of documents within the partition key values specified in the query."
  desc: "Compute BM25 statistics only over the subset of documents within the partition key values specified in the query. This is useful for multi-tenant scenarios where scoring should reflect statistics that are accurate for a specific tenant's dataset."
