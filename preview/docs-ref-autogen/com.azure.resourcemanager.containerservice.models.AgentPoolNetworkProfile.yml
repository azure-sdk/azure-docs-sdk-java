- uid: "com.azure.resourcemanager.containerservice.models.AgentPoolNetworkProfile.secondaryNetworkInterfaces()"
  fullName: "com.azure.resourcemanager.containerservice.models.AgentPoolNetworkProfile.secondaryNetworkInterfaces()"
  name: "secondaryNetworkInterfaces()"
  nameWithType: "AgentPoolNetworkProfile.secondaryNetworkInterfaces()"
  summary: "Get the secondary<wbr>Network<wbr>Interfaces property: Secondary network interface configurations for each VM in the agent pool."
  syntax: "public List<AgentPoolNetworkInterface> secondaryNetworkInterfaces()"
  desc: "Get the secondaryNetworkInterfaces property: Secondary network interface configurations for each VM in the agent pool. Each entry is a template: one physical NIC per entry is provisioned on every VM instance. These interfaces are created at agent pool creation time and are immutable. The length of the list must be less than the NIC capacity minus 1 for the VM size of the agent pool (AKS manages the primary NIC). For example, a Standard\\_D8a\\_v4 VM supports up to 4 NICs, so the maximum number of secondary interfaces allowed is 3. For mixed-SKU VM pools the effective capacity is the minimum across all SKUs: count(secondaryNetworkInterfaces) + 1 <= min(maxNICs). For more information, see https://aka.ms/aks/multi-nic."
  returns:
    description: "the secondaryNetworkInterfaces value."
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/util/List.html\">List</a>&lt;<xref href=\"com.azure.resourcemanager.containerservice.models.AgentPoolNetworkInterface?alt=com.azure.resourcemanager.containerservice.models.AgentPoolNetworkInterface&text=AgentPoolNetworkInterface\" data-throw-if-not-resolved=\"False\" />&gt;"
