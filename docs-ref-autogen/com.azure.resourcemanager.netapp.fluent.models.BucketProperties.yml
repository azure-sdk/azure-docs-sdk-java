  nameWithType: "BucketProperties.akvDetails()"
  summary: "Get the akv<wbr>Details property: Specifies the Azure Key Vault settings."
  syntax: "public AzureKeyVaultDetails akvDetails()"
  desc: "Get the akvDetails property: Specifies the Azure Key Vault settings. These are used when a) retrieving the bucket server certificate, and b) storing the bucket credentials Notes: 1. If a bucket certificate was previously provided directly using the certificateObject property, it is possible to subsequently use the Azure Key Vault for certificate management by using these 'akvDetails' properties. However, once Azure Key Vault is configured, it is no longer possible to provide the certificate directly via the certificateObject property. 2. These properties are mutually exclusive with the server.certificateObject property."
  returns:
    description: "the akvDetails value."
    type: "<xref href=\"com.azure.resourcemanager.netapp.models.AzureKeyVaultDetails?alt=com.azure.resourcemanager.netapp.models.AzureKeyVaultDetails&text=AzureKeyVaultDetails\" data-throw-if-not-resolved=\"False\" />"
