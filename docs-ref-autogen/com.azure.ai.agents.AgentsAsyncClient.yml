  nameWithType: "AgentsAsyncClient.getSessionLogStreamWithResponse(String agentName, String agentVersion, String sessionId, RequestOptions requestOptions)"
  summary: "Streams console logs (stdout / stderr) for a specific hosted agent session as a Server-Sent Events (SSE) stream."
  parameters:
  - description: "The name of the hosted agent."
    name: "agentName"
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
  - description: "The version of the agent."
    name: "agentVersion"
    type: "<a href=\"https://docs.oracle.com/javase/8/docs/api/java/lang/String.html\">String</a>"
