 OffsetDateTime (Optional)\n         warnings (Optional): [\n             (recursive schema, see above)\n         ]\n         stringEncoding: String (Optional)\n         contents (Required): [\n              (Required){\n                 kind: String(document/audioVisual) (Required)\n                 mimeType: String (Required)\n                 analyzerId: String (Optional)\n                 category: String (Optional)\n                 path: String (Optional)\n                 markdown: String (Optional)\n                 fields (Optional): {\n                     String (Required): {\n                         type: String(string/date/time/number/integer/boolean/array/object/json) (Required)\n                         spans (Optional): [\n                              (Optional){\n                                 offset: int (Required)\n                                 length: int (Required)\n                             }\n                         ]\n                         confidence: Double (Optional)\n                         source: String (Optional)\n                     }\n                 }\n             }\n         ]\n     }\n     usage (Optional): {\n         documentPagesMinimal: Integer (Optional)\n         documentPagesBasic: Integer (Optional)\n         documentPagesStandard: Integer (Optional)\n         audioHours: Double (Optional)\n         videoHours: Double (Optional)\n         contextualizationTokens: Integer (Optional)\n         tokens (Optional): {\n             String: int (Required)\n         }\n     }\n }\n```"
  returns:
    description: "the <xref uid=\"com.azure.core.util.polling.SyncPoller\" data-throw-if-not-resolved=\"false\" data-raw-source=\"SyncPoller\"></xref> for polling of provides status details for analyze operations."
